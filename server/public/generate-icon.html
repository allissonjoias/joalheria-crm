<!DOCTYPE html>
<html>
<head><title>Gerar Icone</title></head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Background gradient (dourado)
const grad = ctx.createLinearGradient(0, 0, 1024, 1024);
grad.addColorStop(0, '#b8860b');
grad.addColorStop(0.5, '#d4a843');
grad.addColorStop(1, '#8B6914');

// Rounded rectangle background
ctx.beginPath();
ctx.roundRect(0, 0, 1024, 1024, 180);
ctx.fillStyle = grad;
ctx.fill();

// Inner circle
ctx.beginPath();
ctx.arc(512, 460, 280, 0, Math.PI * 2);
ctx.strokeStyle = 'rgba(255,255,255,0.9)';
ctx.lineWidth = 12;
ctx.stroke();

// Diamond shape inside circle
ctx.beginPath();
ctx.moveTo(512, 220);  // top
ctx.lineTo(720, 460);  // right
ctx.lineTo(512, 700);  // bottom
ctx.lineTo(304, 460);  // left
ctx.closePath();
ctx.fillStyle = 'rgba(255,255,255,0.15)';
ctx.fill();
ctx.strokeStyle = 'rgba(255,255,255,0.8)';
ctx.lineWidth = 6;
ctx.stroke();

// Text "AJ"
ctx.font = 'bold 200px Georgia, serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillStyle = '#fff';
ctx.fillText('AJ', 512, 470);

// Text "ALISSON JOIAS" below
ctx.font = '600 52px -apple-system, sans-serif';
ctx.fillStyle = 'rgba(255,255,255,0.95)';
ctx.fillText('ALISSON JOIAS', 512, 830);

// Subtle line
ctx.beginPath();
ctx.moveTo(312, 780);
ctx.lineTo(712, 780);
ctx.strokeStyle = 'rgba(255,255,255,0.4)';
ctx.lineWidth = 2;
ctx.stroke();

// WhatsApp icon hint
ctx.font = '36px sans-serif';
ctx.fillStyle = 'rgba(255,255,255,0.6)';
ctx.fillText('WhatsApp Business', 512, 920);

// Download
const link = document.createElement('a');
link.download = 'app-icon-1024.png';
link.href = c.toDataURL('image/png');
link.click();
document.body.innerHTML = '<h2 style="font-family:sans-serif;padding:40px">Icone gerado! Verifique seus downloads.</h2><img src="' + c.toDataURL() + '" width="256">';
</script>
</body>
</html>
